<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Patient Journey Inspector</title>
    <link rel="stylesheet" href="/static/styles.css?v=queue-worker-20260604-1" />
  </head>
  <body>
    <div class="app-shell inspector-shell">
      <aside class="sidebar">
        <div class="brand">
          <div>
            <h1>Pipeline Inspector</h1>
            <p>Patient journey chain</p>
          </div>
          <div class="status-stack">
            <span id="healthBadge" class="status-pill">Checking</span>
            <a class="text-link" href="/admin">Admin console</a>
            <a class="text-link" href="/">Doctor view</a>
          </div>
        </div>

        <div class="toolbar">
          <label class="search-box">
            <span>Admin API key</span>
            <input id="apiKeyInput" type="password" autocomplete="off" placeholder="Only needed when auth is enabled" />
          </label>
          <label class="search-box">
            <span>User ID</span>
            <input id="userIdInput" type="text" autocomplete="off" value="admin" />
          </label>
          <label class="search-box">
            <span>Select patient</span>
            <select id="patientSelect"></select>
          </label>
        </div>

        <div id="selectedPatientCard" class="patient-summary-card empty-state" aria-live="polite">
          Select a patient to inspect the journey chain.
        </div>
      </aside>

      <main class="workspace inspector-workspace">
        <section class="record-panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Dry Run</p>
              <h2 id="inspectTitle">Select a patient</h2>
            </div>
            <span id="inspectMeta" class="muted"></span>
          </div>
          <div id="inspectContent" class="inspect-content empty-state">
            Loading pipeline stages...
          </div>
        </section>
      </main>
    </div>

    <script src="/static/inspect.js?v=queue-worker-20260604-1"></script>
  </body>
</html>
