<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clinical AI System</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div>
            <h1>Clinical AI System</h1>
            <p>Local HIS + RAG workbench</p>
          </div>
          <div class="status-stack">
            <span id="healthBadge" class="status-pill">Checking</span>
            <span id="vectorBadge" class="status-pill muted-pill">Vector: checking</span>
          </div>
        </div>

        <div class="toolbar">
          <label class="search-box">
            <span>Select patient</span>
            <select id="patientSelect"></select>
          </label>
          <button id="rebuildIndexBtn" class="secondary-button" type="button">Rebuild Index</button>
        </div>

        <div id="selectedPatientCard" class="patient-summary-card empty-state" aria-live="polite">
          Select a patient to load their holistic view.
        </div>
        <div class="admin-link-row">
          <a class="text-link" href="/admin">Admin console</a>
          <a class="text-link" href="/inspect">Pipeline inspector</a>
        </div>

      </aside>

      <main class="workspace">
        <section class="record-panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Doctor Review</p>
              <h2 id="patientTitle">Select a patient</h2>
            </div>
            <span id="patientMeta" class="muted"></span>
          </div>
          <div id="recordContent" class="record-content empty-state">
            Choose a patient from the dropdown to inspect structured data and notes.
          </div>
        </section>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
