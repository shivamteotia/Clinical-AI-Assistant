services:
  app:
    build:
      context: .
    image: clinical-ai-system:local
    container_name: clinical-ai-system-app
    env_file:
      - .env
    environment:
      VECTOR_STORE_PROVIDER: ${VECTOR_STORE_PROVIDER:-qdrant}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-clinical_patient_chunks}
      PATIENT_JOURNEY_LLM_PROVIDER: ${PATIENT_JOURNEY_LLM_PROVIDER:-groq}
      PATIENT_JOURNEY_MODEL: ${PATIENT_JOURNEY_MODEL:-llama-3.3-70b-versatile}
      JOURNEY_STORE_PROVIDER: ${JOURNEY_STORE_PROVIDER:-json}
      DATABASE_URL: ${DATABASE_URL:-postgresql://clinical_ai:clinical_ai@postgres:5432/clinical_ai}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:v1.12.4
    profiles:
      - local-qdrant
    container_name: clinical-ai-system-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    profiles:
      - local-postgres
    container_name: clinical-ai-system-postgres
    environment:
      POSTGRES_DB: clinical_ai
      POSTGRES_USER: clinical_ai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinical_ai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinical_ai -d clinical_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_storage:
  postgres_data:
